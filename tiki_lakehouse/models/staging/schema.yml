version: 2

models:
  - name: stg_tiki_listing
    description: "Staged listing data — aliased columns from silver_listing"
    columns:
      - name: product_id
        description: "Aliased from silver_listing.id"
        tests:
          - not_null
          - unique

      - name: name
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: rating_average
        tests:
          - not_null

  - name: stg_tiki_detail
    description: "Staged detail data from silver_detail"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

      - name: name
        tests:
          - not_null

      - name: price
        tests:
          - not_null

  - name: stg_tiki_reviews
    description: "Staged reviews from silver_reviews"
    columns:
      - name: review_id
        tests:
          - not_null
          - unique

      - name: product_id
        tests:
          - not_null

      - name: rating
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]